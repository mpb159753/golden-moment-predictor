# GMP 引擎全局配置
# 来源: design/09-testing-config.md §9.5

# 缓存配置
cache:
  memory_ttl_seconds: 300
  db_ttl_seconds: 3600
  db_path: "db/gmp_cache.db"

# 坐标精度
coord_precision: 2

# 安全阈值
thresholds:
  precip_probability: 50
  visibility_min: 1000
  local_cloud_max: 30
  target_cloud_max: 30
  light_path_cloud_max: 50
  wind_speed_max: 20
  frost_temperature: 2.0

# 光路计算
light_path:
  count: 10
  interval_km: 10

# 评分权重 (各 Plugin 独立配置)
scoring:
  golden_mountain:
    light_path: 35
    target_visible: 40
    local_clear: 25
    veto_threshold: 0

  cloud_sea:
    gap: 50
    density: 30
    wind: 20

  frost:
    temperature: 40
    moisture: 30
    wind: 20
    cloud: 10

  stargazing:
    base_optimal: 100
    base_good: 90
    base_partial: 70
    cloud_penalty_factor: 0.8

  snow_tree:
    snow_signal: 60
    clear_weather: 20
    stability: 20
    age_deduction_max: 20
    temp_deduction_max: 22
    sun_deduction_max: 30
    wind_deduction_max: 50

  ice_icicle:
    water_input: 50
    freeze_strength: 30
    view_quality: 20
    age_deduction_max: 20
    temp_deduction_max: 22

# Analyzer 层评分配置 (L1/L2 综合评分)
analyzer_scoring:
  l1:
    base_score: 50
    cloud_sea_bonus: 15
    frost_bonus: 10
    low_cloud_bonus: 15
    low_cloud_mid_bonus: 8
    low_cloud_threshold: 30
    mid_cloud_threshold: 60
    low_wind_bonus: 10
    low_wind_mid_bonus: 5
    low_wind_threshold: 20.0
    mid_wind_threshold: 30.0
  l2:
    base_score: 20
    light_path_max: 40
    light_path_good_threshold: 25.0
    target_primary_bonus: 25
    target_primary_blocked_bonus: 5
    target_secondary_max: 15

# Reporter 输出层配置
reporter:
  l1_precip_threshold: 30    # 降水概率超过此值 → L1 不通过
  overcast_threshold: 60     # 云量超过此值 → overcast 标签
  rain_threshold: 50         # 降水概率超过此值 → rain 标签

# 调度器配置
scheduler:
  default_target_hour: 7    # 默认分析小时 (日出分析)

# 置信度映射
confidence:
  high: [1, 2]
  medium: [3, 4]
  low: [5, 6, 7]

# 摘要生成
summary:
  mode: "rule"

# 分页
pagination:
  default_page_size: 20
  max_page_size: 100

# 日志配置
logging:
  level: "INFO"
  format: "console"    # console / json

# 并发限制
concurrency:
  api_max_concurrent: 5
  batch_max_concurrent: 3
  api_daily_limit: 10000
